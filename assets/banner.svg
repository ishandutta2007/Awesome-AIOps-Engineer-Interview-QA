<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2027;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#203a43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5364;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="200" fill="url(#grad1)" rx="15" ry="15"/>
  
  <!-- Dynamic background elements -->
  <g opacity="0.5">
    <circle cx="150" cy="80" r="2" fill="#fff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="650" cy="130" r="2" fill="#fff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="450" cy="40" r="1.5" fill="#fff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- Floating tech nodes -->
    <circle cx="80" cy="150" r="15" fill="none" stroke="#00f2fe" stroke-width="2">
      <animate attributeName="cy" values="150;135;150" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="720" cy="60" r="22" fill="none" stroke="#4facfe" stroke-width="2">
      <animate attributeName="cy" values="60;45;60" dur="6s" repeatCount="indefinite" />
      <animate attributeName="r" values="22;25;22" dur="3s" repeatCount="indefinite" />
    </circle>
    <path d="M 50,80 L 90,40 L 130,80" fill="none" stroke="#00f2fe" stroke-width="1.5">
       <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="4.5s" repeatCount="indefinite" />
    </path>
    <rect x="680" y="120" width="30" height="30" fill="none" stroke="#ffffff" stroke-width="1.5">
       <animateTransform attributeName="transform" type="rotate" from="0 695 135" to="360 695 135" dur="15s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Title Text -->
  <text x="400" y="95" font-family="'Segoe UI', -apple-system, Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="800" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">
    Awesome AI Ops Engineer
  </text>
  <text x="400" y="145" font-family="'Segoe UI', -apple-system, Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="#e0e0e0" text-anchor="middle" letter-spacing="2">
    INTERVIEW Q&amp;A
  </text>
  
  <!-- Animated Data Flow Line (Sine Wave) -->
  <path d="M 0 190 Q 200 160 400 190 T 800 190" fill="none" stroke="rgba(79, 172, 254, 0.4)" stroke-width="3">
    <animate attributeName="d" values="M 0 190 Q 200 160 400 190 T 800 190; M 0 190 Q 200 220 400 190 T 800 190; M 0 190 Q 200 160 400 190 T 800 190" dur="5s" repeatCount="indefinite"/>
  </path>
</svg>
